name: Release Copilot Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch plugin version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for semver in plugin.json
          SEMVER="${VERSION#v}"
          jq --arg v "$SEMVER" '.version = $v' plugin/plugin.json > plugin/plugin.json.tmp
          mv plugin/plugin.json.tmp plugin/plugin.json

      - name: Package plugin
        run: |
          cd plugin
          zip -r ../skills-budget-plugin.zip .
          cd ..
          echo "Plugin contents:"
          unzip -l skills-budget-plugin.zip

      - name: Generate install script
        run: |
          cat > install.sh << 'INSTALL'
          #!/usr/bin/env bash
          set -euo pipefail

          PLUGIN_DIR="${HOME}/.copilot-skills-budget-plugin"
          HOOKS_DIR="${HOME}/.copilot/hooks"
          HOOK_FILE="${HOOKS_DIR}/skills-budget.json"

          echo "Installing skills-budget Copilot plugin..."

          # Extract plugin
          mkdir -p "$PLUGIN_DIR"
          unzip -o skills-budget-plugin.zip -d "$PLUGIN_DIR"
          echo "✅ Plugin extracted to $PLUGIN_DIR"

          # Install via Copilot CLI
          copilot plugin install "$PLUGIN_DIR"
          echo "✅ Plugin installed"

          # Create user-level startup hook
          mkdir -p "$HOOKS_DIR"
          cat > "$HOOK_FILE" << 'EOF'
          {
            "version": 1,
            "hooks": {
              "sessionStart": [
                {
                  "type": "prompt",
                  "prompt": "Check my skills context budget and report any warnings"
                }
              ]
            }
          }
          EOF
          echo "✅ Startup hook created at $HOOK_FILE"

          echo ""
          echo "Done! Start a new Copilot session to see the budget check."
          INSTALL
          chmod +x install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "skills-budget plugin ${{ steps.version.outputs.version }}"
          body: |
            ## Skills Context Budget Guard — Copilot CLI Plugin

            Warns when installed skill descriptions exceed 1% of the model context window.

            ### Quick install

            ```bash
            # 1. Download and extract
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/skills-budget-plugin.zip -o skills-budget-plugin.zip
            bash install.sh
            ```

            See [README](https://github.com/${{ github.repository }}#copilot-cli-plugin) for manual installation steps.
          files: |
            skills-budget-plugin.zip
            install.sh
          draft: false
          prerelease: false
