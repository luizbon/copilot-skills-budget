name: Release Copilot Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch plugin versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION#v}"
          jq --arg v "$SEMVER" '.version = $v' plugin/skills-budget/plugin.json > plugin/skills-budget/plugin.json.tmp
          mv plugin/skills-budget/plugin.json.tmp plugin/skills-budget/plugin.json
          jq --arg v "$SEMVER" '.version = $v' plugin/skills-profile/plugin.json > plugin/skills-profile/plugin.json.tmp
          mv plugin/skills-profile/plugin.json.tmp plugin/skills-profile/plugin.json

      - name: Package plugins
        run: |
          cd plugin/skills-budget
          zip -r ../../skills-budget-plugin.zip .
          cd ../../plugin/skills-profile
          zip -r ../../skills-profile-plugin.zip .
          cd ../..
          echo "skills-budget contents:"
          unzip -l skills-budget-plugin.zip
          echo "skills-profile contents:"
          unzip -l skills-profile-plugin.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "skills-budget + skills-profile plugins ${{ steps.version.outputs.version }}"
          body: |
            ## Skills Context Budget Guard & Skills Profile Manager — Copilot CLI Plugins

            **skills-budget** — warns when installed skill descriptions exceed 1% of the model context window.

            **skills-profile** — manage named profiles of enabled/disabled skills.

            ### One-line install

            **macOS / Linux**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```

            See [README](https://github.com/${{ github.repository }}#copilot-cli-plugin) for manual installation steps.
          files: |
            skills-budget-plugin.zip
            skills-profile-plugin.zip
            install.sh
            install.ps1
          draft: false
          prerelease: false
