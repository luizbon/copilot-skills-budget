name: Release Copilot Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch plugin version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for semver in plugin.json
          SEMVER="${VERSION#v}"
          jq --arg v "$SEMVER" '.version = $v' plugin/plugin.json > plugin/plugin.json.tmp
          mv plugin/plugin.json.tmp plugin/plugin.json

      - name: Package plugin
        run: |
          cd plugin
          zip -r ../skills-budget-plugin.zip .
          cd ..
          echo "Plugin contents:"
          unzip -l skills-budget-plugin.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "skills-budget plugin ${{ steps.version.outputs.version }}"
          body: |
            ## Skills Context Budget Guard — Copilot CLI Plugin

            Warns when installed skill descriptions exceed 1% of the model context window.

            ### One-line install

            **macOS / Linux**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```

            See [README](https://github.com/${{ github.repository }}#copilot-cli-plugin) for manual installation steps.
          files: |
            skills-budget-plugin.zip
            install.sh
            install.ps1
          draft: false
          prerelease: false
